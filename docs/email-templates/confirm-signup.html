<!--
  Письмо подтверждения регистрации Recall.
  Куда вставлять: Supabase → Authentication → Emails → вкладка Templates →
  «Confirm signup» → поле Message body. Тему письма (Subject) поставить:
      Подтверди почту — Recall

  Переменные Supabase: {{ .ConfirmationURL }} — ссылка подтверждения,
  {{ .Email }} — адрес получателя, {{ .SiteURL }} — адрес приложения.

  Почему письмо простое и без картинок: письма от нового отправителя без своего
  домена и так попадают под подозрение почтовиков, а тяжёлая вёрстка с внешними
  картинками добавляет поводов уехать в «Спам». Здесь только текст, одна кнопка
  и дублирующая ссылка (кнопки в некоторых клиентах не работают).
-->
<div style="margin:0;padding:24px 0;background:#f4f4f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  <div style="max-width:480px;margin:0 auto;padding:32px 28px;background:#ffffff;border-radius:14px;">

    <p style="margin:0 0 4px;font-size:20px;font-weight:700;color:#1e2030;">Recall</p>
    <p style="margin:0 0 24px;font-size:13px;color:#6b7280;">Английский и испанский каждый день</p>

    <p style="margin:0 0 16px;font-size:16px;line-height:1.5;color:#1e2030;">
      Осталось подтвердить почту — и можно заниматься.
    </p>

    <p style="margin:0 0 24px;">
      <a href="{{ .ConfirmationURL }}"
         style="display:inline-block;padding:13px 26px;background:#9184d9;border-radius:10px;
                font-size:16px;font-weight:600;color:#ffffff;text-decoration:none;">
        Подтвердить почту
      </a>
    </p>

    <p style="margin:0 0 6px;font-size:13px;color:#6b7280;">
      Кнопка не сработала? Открой ссылку вручную:
    </p>
    <p style="margin:0 0 24px;font-size:12px;word-break:break-all;">
      <a href="{{ .ConfirmationURL }}" style="color:#6d5fc7;">{{ .ConfirmationURL }}</a>
    </p>

    <p style="margin:0;padding-top:18px;border-top:1px solid #e5e7eb;font-size:12px;line-height:1.6;color:#9ca3af;">
      Письмо пришло на {{ .Email }}. Если ты не регистрировался в Recall — просто
      удали его, ничего не произойдёт.
    </p>

  </div>
</div>
